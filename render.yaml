services:
  - type: web
    name: cardio-risk-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cardio-risk-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: cardio-risk-db
    plan: free
    databaseName: cardio_db
    user: cardio
